# Redocly 設定: Dustalk 連携 API ドキュメント (phone / chat / imagemodel)。
# プレビュー: npx @redocly/cli preview-docs phone@v1
# 検証:      npx @redocly/cli lint
apis:
  phone@v1:
    root: phone/openapi.yaml
  chat@v1:
    root: chat/openapi.chat.yaml
  imagemodel@v1:
    root: imagemodel/openapi.yaml

rules:
  # 暫定仕様 (phone/chat) を含むため、運用ルールは緩める。
  info-license: off
  operation-4xx-response: warn
  no-server-example.com: off  # servers の url は暫定プレースホルダ
